LeftMouseUpAction=[!CommandMeasure MeasureBattery "RefreshNow()"]
MouseActionCursor=1
ContextTitle=Refresh Now
ContextAction=[!CommandMeasure MeasureBattery "RefreshNow()"]
ContextTitle2=Open Synapse Log Folder
ContextAction2=["#LogFolder#"]
ContextTitle3=Open Skin Folder
ContextAction3=["#CURRENTPATH#"]
ContextTitle4=#DevContextTitle4#
ContextAction4=#DevContextAction4#
ContextTitle5=#DevContextTitle5#
ContextAction5=#DevContextAction5#
ContextTitle6=#DevContextTitle6#
ContextAction6=#DevContextAction6#
ContextTitle7=#DevContextTitle7#
ContextAction7=#DevContextAction7#
ContextTitle8=#DevContextTitle8#
ContextAction8=#DevContextAction8#
ContextTitle9=#DevContextTitle9#
ContextAction9=#DevContextAction9#
ContextTitle10=#DevContextTitle10#
ContextAction10=#DevContextAction10#
ContextTitle11=#DevContextTitle11#
ContextAction11=#DevContextAction11#
ContextTitle12=#DevContextTitle12#
ContextAction12=#DevContextAction12#
ContextTitle13=#DevContextTitle13#
ContextAction13=#DevContextAction13#
ContextTitle14=#DevContextTitle14#
