[Metadata]
Name=BlackSharkBattery
Author=darojax, with implementation assistance from OpenAI Codex
Information=Razer BlackShark V2 Pro (2023) Rainmeter battery skin using local Razer Synapse 3 log data.
Version=1.3.2
License=MIT

[Variables]
Scale=1
WidgetW=(170*#Scale#)
WidgetH=(40*#Scale#)
ContentOffsetX=(28*#Scale#)
PrimaryContentCenterX=((40*#Scale#)+#ContentOffsetX#)
BodyW=(28*#Scale#)
BodyH=(14*#Scale#)
FillMaxW=(22*#Scale#)
FillH=(8*#Scale#)
CapW=(3*#Scale#)
CapH=(6*#Scale#)
LogFolder=
LogFile=
DevicePattern=BlackShark V2 Pro
TailBytes=524288
PollSeconds=60
LifecyclePollSeconds=5
LifecycleTailBytes=32768
StaleMinutes=180
DisconnectDebounceSeconds=15
HistoryDays=21
HistoryRefreshHours=6
YellowThreshold=30
OrangeThreshold=20
RedThreshold=10
EstimateRecentHours=12
EstimateMediumHours=168
EstimateLongHours=504
EstimateMaxGapHours=3
EstimateMinTotalDrop=3
PreviewFullChargeHours=46.86
ShowDeveloperPreviews=0
DevMode=0
DevBatteryPercent=75
DevBatteryState=NotCharging
DevForceStale=0
DevForceDisconnected=0
DevForceEstimateUnavailable=0
DevContextTitle4=
DevContextAction4=
DevContextTitle5=
DevContextAction5=
DevContextTitle6=
DevContextAction6=
DevContextTitle7=
DevContextAction7=
DevContextTitle8=
DevContextAction8=
DevContextTitle9=
DevContextAction9=
DevContextTitle10=
DevContextAction10=
DevContextTitle11=
DevContextAction11=
DevContextTitle12=
DevContextAction12=
DevContextTitle13=
DevContextAction13=
DevContextTitle14=
DevContextAction14=
DevContextTitle15=
DevContextAction15=
DevContextTitle16=
DevContextAction16=
BatteryDisplay=--%
BatteryStatus=Waiting for Synapse
BatteryTimestamp=
BatteryColor=110,110,110,255
BatteryOutlineColor=110,110,110,255
BatteryCapColor=110,110,110,255
BatteryTextColor=110,110,110,255
LabelColor=110,110,110,255
ChargeBoltColor=74,222,128,0
ChargeBoltHidden=1
StaleMarkColor=251,191,36,0
StaleMarkHidden=1
BatteryFillW=0
EstimateText=Estimate unavailable: collecting discharge history
EstimateDisplay=Charge left: Insufficient logs
BatteryTooltip=Waiting for Synapse

[MeasureBattery]
Measure=Script
ScriptFile=#@#BlackSharkBattery.lua

[MeterHitbox]
Meter=Shape
Shape=Rectangle 0,0,#WidgetW#,#WidgetH#,6 | Fill Color 0,0,0,1 | StrokeWidth 0
ToolTipText=#BatteryTooltip#
DynamicVariables=1

[MeterBatteryOutline]
Meter=Shape
X=((4*#Scale#)+#ContentOffsetX#)
Y=(8*#Scale#)
Shape=Rectangle 0,0,#BodyW#,#BodyH#,3 | Fill Color 0,0,0,1 | StrokeWidth 2 | Stroke Color #BatteryOutlineColor#
DynamicVariables=1

[MeterBatteryFill]
Meter=Shape
X=((7*#Scale#)+#ContentOffsetX#)
Y=(11*#Scale#)
Shape=Rectangle 0,0,#BatteryFillW#,#FillH#,2 | Fill Color #BatteryColor# | StrokeWidth 0
DynamicVariables=1

[MeterBatteryCap]
Meter=Shape
X=((34*#Scale#)+#ContentOffsetX#)
Y=(12*#Scale#)
Shape=Rectangle 0,0,#CapW#,#CapH#,1 | Fill Color #BatteryCapColor# | StrokeWidth 0
DynamicVariables=1

[MeterChargeBolt]
Meter=Shape
X=((81*#Scale#)+#ContentOffsetX#)
Y=(10*#Scale#)
W=(10*#Scale#)
H=(12*#Scale#)
Shape=Path ChargeBoltPath | Fill Color #ChargeBoltColor# | StrokeWidth 0
ChargeBoltPath=7,0 | LineTo 2,6 | LineTo 5,6 | LineTo 3,12 | LineTo 9,5 | LineTo 6,5 | LineTo 8,0 | ClosePath 1
DynamicVariables=1
Hidden=#ChargeBoltHidden#

[MeterStaleMark]
Meter=String
X=((83*#Scale#)+#ContentOffsetX#)
Y=(4*#Scale#)
FontFace=Segoe UI Semibold
FontSize=(12*#Scale#)
FontColor=#StaleMarkColor#
AntiAlias=1
DynamicVariables=1
Hidden=#StaleMarkHidden#
Text=?

[MeterPercent]
Meter=String
X=((44*#Scale#)+#ContentOffsetX#)
Y=(2*#Scale#)
FontFace=Segoe UI Semibold
FontSize=(13*#Scale#)
FontColor=#BatteryTextColor#
AntiAlias=1
DynamicVariables=1
Text=#BatteryDisplay#

[MeterLabel]
Meter=String
X=#PrimaryContentCenterX#
Y=(24*#Scale#)
FontFace=Segoe UI
FontSize=(7*#Scale#)
FontColor=#LabelColor#
StringAlign=Center
AntiAlias=1
DynamicVariables=1
Text=#EstimateDisplay#
